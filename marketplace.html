<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace - Faraja</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1b34;
    color: white;
}

.container {
    padding: 40px;
}

h1 {
    font-size: 36px;
}

p {
    color: #9aa4b2;
}

/* FILTER BUTTONS */
.tabs {
    margin: 20px 0;
}

.tab-btn {
    padding: 10px 18px;
    margin-right: 10px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #1e2f4d;
    color: white;
    transition: 0.3s;
}

.tab-btn:hover {
    background: #2a4065;
}

.tab-btn.active {
    background: orange;
    color: black;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.vendor-card {
    background: #122544;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s;
}

.vendor-card:hover {
    transform: scale(1.02);
}

.image {
    height: 160px;
    background: #2c3e60;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
}

.content {
    padding: 20px;
}

.tag {
    background: orange;
    color: black;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    display: inline-block;
    margin-bottom: 10px;
}

.price {
    margin-top: 10px;
    font-weight: bold;
}

.btn {
    margin-top: 15px;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: orange;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #ffb733;
}

/* HIDDEN CLASS */
.hidden {
    display: none !important;
}

</style>
</head>

<body>

<div class="container">

    <h1>Verified Services Directory</h1>
    <p>Book trusted local providers easily.</p>

    <!-- FILTER BUTTONS -->
    <div class="tabs">
        <button class="tab-btn active" data-filter="all">All</button>
        <button class="tab-btn" data-filter="transport">Hearses</button>
        <button class="tab-btn" data-filter="tents">Tents</button>
        <button class="tab-btn" data-filter="sound">Sound</button>
    </div>

    <!-- CARDS -->
    <div class="cards">

        <div class="vendor-card" data-category="transport">
            <div class="image">Hearse Image</div>
            <div class="content">
                <div class="tag">Transport</div>
                <h3>Nyati Hearse Services</h3>
                <p>Nairobi & nearby regions</p>
                <div class="price">KES 25,000</div>
                <button class="btn book-btn" data-name="Nyati Hearse Services">Book Service</button>
            </div>
        </div>

        <div class="vendor-card" data-category="tents">
            <div class="image">Tent Image</div>
            <div class="content">
                <div class="tag">Tents</div>
                <h3>Shujaa Tent Services</h3>
                <p>Kiambu & Nairobi</p>
                <div class="price">KES 40,000</div>
                <button class="btn book-btn" data-name="Shujaa Tent Services">Book Service</button>
            </div>
        </div>

        <div class="vendor-card" data-category="sound">
            <div class="image">Sound System</div>
            <div class="content">
                <div class="tag">Sound</div>
                <h3>Elite Sound Systems</h3>
                <p>All regions</p>
                <div class="price">KES 15,000</div>
                <button class="btn book-btn" data-name="Elite Sound Systems">Book Service</button>
            </div>
        </div>

    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const tabs = document.querySelectorAll('.tab-btn');
    const cards = document.querySelectorAll('.vendor-card');
    const bookButtons = document.querySelectorAll('.book-btn');

    // FILTER FUNCTION
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {

            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            const filter = tab.dataset.filter;

            cards.forEach(card => {
                const category = card.dataset.category;

                if (filter === 'all' || filter === category) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });
        });
    });

    // BOOK BUTTON FUNCTION
    bookButtons.forEach(button => {
        button.addEventListener('click', () => {
            const serviceName = button.dataset.name;

            alert("✅ Booking started for: " + serviceName);

            // OPTIONAL: redirect to booking page
            // window.location.href = "booking.html";
        });
    });

});
</script>

</body>
</html>
