<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password — Faraja</title>
  <meta name="description" content="Set a new password for your Faraja account." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>" />
</head>
<body>

<a href="login.html" style="position:fixed;top:24px;left:24px;z-index:100;display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-muted);transition:var(--transition);" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">
  ← Back to Sign In
</a>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <a href="index.html" style="display:inline-block;">
        <div class="auth-logo-icon">🕊</div>
        <div class="auth-logo-name">Fa<span>raja</span></div>
      </a>
    </div>

    <!-- Step 1: Enter new password -->
    <div id="resetStep">
      <div style="width:64px;height:64px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 24px;">🔐</div>
      <h2 class="auth-title text-center">Set New Password</h2>
      <p class="auth-subtitle text-muted text-center" style="margin-bottom:32px;">Choose a strong password for your account.</p>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPwd">New Password</label>
          <div class="input-group">
            <span class="input-icon">🔑</span>
            <input type="password" id="newPwd" name="password" class="form-control" placeholder="At least 8 characters" minlength="8" autocomplete="new-password" />
          </div>
          <div class="form-hint" id="pwdStrength"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPwd">Confirm Password</label>
          <div class="input-group">
            <span class="input-icon">✓</span>
            <input type="password" id="confirmPwd" class="form-control" placeholder="Repeat your password" minlength="8" autocomplete="new-password" />
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-full" id="resetBtn">
          Reset Password
        </button>
      </form>
    </div>

    <!-- Step 2: Success -->
    <div id="resetSuccess" style="display:none;text-align:center;">
      <div style="width:80px;height:80px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 28px;">✅</div>
      <h2 class="auth-title">Password Reset!</h2>
      <p class="auth-subtitle text-muted" style="margin-bottom:32px;">Your password has been updated successfully.</p>
      <a href="login.html" class="btn btn-primary btn-lg btn-full">Sign In →</a>
    </div>

    <!-- Step 3: Error / Invalid -->
    <div id="resetError" style="display:none;text-align:center;">
      <div style="width:80px;height:80px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 28px;">⚠️</div>
      <h2 class="auth-title">Invalid or Expired Link</h2>
      <p class="auth-subtitle text-muted" style="margin-bottom:32px;">This reset link is no longer valid. Please request a new one.</p>
      <a href="forgot-password.html" class="btn btn-primary btn-lg btn-full">Request New Link →</a>
    </div>

  </div>
</div>

<div class="toast-container"></div>
<script src="js/main.js"></script>
<script>
  const token = Utils.getParam('token');
  if (!token) {
    document.getElementById('resetStep').style.display = 'none';
    document.getElementById('resetError').style.display = 'block';
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('newPwd');
    const confirm = document.getElementById('confirmPwd');
    let ok = true;
    if (!validateField(pwd, [validators.required, validators.minLen(8)], e.target)) ok = false;
    if (pwd.value !== confirm.value) {
      showToast('Passwords do not match', 'error');
      ok = false;
    }
    if (!ok) return;

    const btn = document.getElementById('resetBtn');
    Utils.setButtonLoading(btn, true);

    try {
      const res = await apiRequest('/auth/reset-password', {
        method: 'POST',
        body: { token, password: pwd.value },
        auth: false,
      });
      if (res.success) {
        document.getElementById('resetStep').style.display = 'none';
        document.getElementById('resetSuccess').style.display = 'block';
      } else {
        showToast(res.message || 'Reset failed', 'error');
      }
    } catch (err) {
      showToast(err.message, 'error');
    }

    Utils.setButtonLoading(btn, false);
  });
</script>
</body>
</html>
