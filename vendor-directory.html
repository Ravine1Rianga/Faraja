<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Directory — Faraja</title>
  <meta name="description" content="Browse verified funeral service vendors on Faraja — caskets, tents, catering, and more." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>" />
</head>
<body>

<!-- Sidebar (role-aware) -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🕊</div>
    <span class="sidebar-logo-text">Fa<span>raja</span></span>
  </div>
  <div id="sidebarNav"></div>
  <div class="sidebar-bottom">
    <div class="sidebar-user" onclick="window.location.href='profile.html'">
      <div class="avatar user-avatar-initials">—</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name user-name">User</div>
        <div class="sidebar-user-role user-role">Loading…</div>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px;" onclick="FarajaAPI.logout()">Sign Out</button>
  </div>
</div>
<button class="sidebar-toggle" id="sidebarToggle">☰</button>

<main class="main-content">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-inner">
      <div>
        <h1 class="page-title">Vendor Directory</h1>
        <p class="page-subtitle">Browse verified funeral service providers in Kenya</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge badge-active" id="vendorCount">0 vendors</span>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="section-card animate-on-scroll" style="margin-bottom:24px;">
    <div class="section-card-header" style="border-bottom:none;">
      <div class="toolbar" style="width:100%;">
        <div class="search-bar" style="flex:1;">
          <span class="search-bar-icon">🔍</span>
          <input type="text" id="vendorSearch" placeholder="Search vendors, services, location…" oninput="renderVendors()" style="width:100%;" />
        </div>
        <select class="toolbar-select" id="catFilter" onchange="renderVendors()">
          <option value="">All Categories</option>
          <option>Caskets</option><option>Tents</option><option>Chairs</option>
          <option>PA Systems</option><option>Catering</option><option>Flowers</option>
          <option>Transport</option><option>Embalming</option><option>Other</option>
        </select>
        <select class="toolbar-select" id="sortFilter" onchange="renderVendors()">
          <option value="name">Sort: Name A-Z</option>
          <option value="rating">Sort: Highest Rated</option>
          <option value="newest">Sort: Newest</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Category Quick-Filter pills -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;" id="catPills">
    <button class="btn btn-secondary btn-sm cat-pill-btn active" data-cat="" onclick="selectCatPill(this,'')">All</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Caskets"    onclick="selectCatPill(this,'Caskets')">⚰️ Caskets</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Tents"      onclick="selectCatPill(this,'Tents')">⛺ Tents</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Chairs"     onclick="selectCatPill(this,'Chairs')">🪑 Chairs</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="PA Systems" onclick="selectCatPill(this,'PA Systems')">🔊 PA Systems</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Catering"   onclick="selectCatPill(this,'Catering')">🍽️ Catering</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Flowers"    onclick="selectCatPill(this,'Flowers')">💐 Flowers</button>
    <button class="btn btn-secondary btn-sm cat-pill-btn" data-cat="Transport"  onclick="selectCatPill(this,'Transport')">🚗 Transport</button>
  </div>

  <!-- Vendor Grid -->
  <div class="grid grid-3 init-hidden" id="vendorGrid" style="margin-bottom:40px;"></div>

</main>

<div class="toast-container"></div>
<script src="js/main.js"></script>
<script>
'use strict';

requireAuth();

function renderSidebar() {
  const user = FarajaAPI.currentUser();
  const role = user ? (user.role || user.role_name) : '';
  const isVendor = role === 'vendor';
  const nav = document.getElementById('sidebarNav');
  if (isVendor) {
    nav.innerHTML = '<div class="sidebar-section-label">Vendor Hub</div>' +
      '<a href="vendor-dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">🏪</span> My Dashboard</a>' +
      '<a href="vendor-directory.html" class="sidebar-link active"><span class="sidebar-link-icon">📋</span> Vendor Directory</a>' +
      '<div class="sidebar-section-label">Account</div>' +
      '<a href="profile.html" class="sidebar-link"><span class="sidebar-link-icon">👤</span> Profile</a>';
  } else {
    nav.innerHTML = '<div class="sidebar-section-label">Management</div>' +
      '<a href="funeral-dashboard.html" class="sidebar-link"><span class="sidebar-link-icon">🏠</span> Dashboard</a>' +
      '<a href="create-funeral.html" class="sidebar-link"><span class="sidebar-link-icon">➕</span> New Funeral</a>' +
      '<a href="committee.html" class="sidebar-link"><span class="sidebar-link-icon">👥</span> Committee</a>' +
      '<a href="tasks.html" class="sidebar-link"><span class="sidebar-link-icon">✅</span> Tasks</a>' +
      '<a href="order-of-service.html" class="sidebar-link"><span class="sidebar-link-icon">📄</span> Order of Service</a>' +
      '<a href="vendor-directory.html" class="sidebar-link active"><span class="sidebar-link-icon">🏪</span> Vendors</a>' +
      '<div class="sidebar-section-label">Finance</div>' +
      '<a href="contributions.html" class="sidebar-link"><span class="sidebar-link-icon">💰</span> Contributions</a>' +
      '<a href="financials.html" class="sidebar-link"><span class="sidebar-link-icon">📊</span> Financials</a>' +
      '<div class="sidebar-section-label">Account</div>' +
      '<a href="profile.html" class="sidebar-link"><span class="sidebar-link-icon">👤</span> Profile</a>';
  }
}
renderSidebar();
populateUserInfo();

let allVendors   = [];
let allProducts  = [];
let selectedCat  = '';

async function init() {
  allVendors  = await FarajaAPI.getActiveVendors();
  allProducts = await FarajaAPI.getProducts();
  // Seed demo vendors if none (test mode only)
  if (!allVendors.length && TestMode.isOn()) seedDemoVendors();
  renderVendors();
  document.getElementById('vendorCount').textContent = allVendors.length + ' vendor' + (allVendors.length !== 1 ? 's' : '');
  document.getElementById('vendorGrid').classList.replace('init-hidden', 'init-reveal');
}

function renderVendors() {
  const search = (document.getElementById('vendorSearch').value || '').toLowerCase();
  const cat    = document.getElementById('catFilter').value  || selectedCat;
  const sort   = document.getElementById('sortFilter').value;

  let list = allVendors.filter(v => {
    const matchSearch = !search ||
      (v.businessName||'').toLowerCase().includes(search) ||
      (v.location||'').toLowerCase().includes(search) ||
      (v.category||'').toLowerCase().includes(search) ||
      (v.description||'').toLowerCase().includes(search);
    const matchCat = !cat || v.category === cat;
    return matchSearch && matchCat && v.status !== 'suspended';
  });

  if (sort === 'rating') list.sort((a,b) => (b.rating||0)-(a.rating||0));
  else if (sort === 'newest') list.sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
  else list.sort((a,b) => (a.businessName||'').localeCompare(b.businessName||''));

  const grid = document.getElementById('vendorGrid');
  if (!list.length) {
    grid.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state">' +
      '<div class="empty-state-icon">🏪</div>' +
      '<div class="empty-state-title">No vendors found</div>' +
      '<div class="empty-state-desc">Try a different search or category filter.</div>' +
      '</div></div>';
    return;
  }

  grid.innerHTML = list.map(v => {
    const prods   = allProducts.filter(p => p.vendorId === v.id && p.status === 'active');
    const stars   = starsHtml(v.rating || 5);
    const icon    = catIcon(v.category);
    return '<div class="vendor-card animate-on-scroll" onclick="location.href=\'vendor-detail.html?id=' + encodeURIComponent(String(v.id)) + '\'">' +
      '<div class="vendor-card-header">' +
        '<div class="vendor-avatar">' + icon + '</div>' +
        '<div class="vendor-card-meta">' +
          '<div class="vendor-card-name">' + escH(v.businessName) + '</div>' +
          '<div class="vendor-card-location">📍 ' + escH(v.location||'Kenya') + '</div>' +
          '<div style="margin-top:6px;">' +
            '<span class="cat-chip ' + catClass(v.category) + '">' + escH(v.category) + '</span>' +
            (v.verified ? '<span class="badge badge-verified" style="margin-left:4px;">✔ Verified</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div style="font-size:0.82rem;color:var(--text-muted);margin-top:10px;min-height:36px;">' + escH((v.description||'').slice(0,90)) + ((v.description||'').length>90?'…':'') + '</div>' +
      '<div class="vendor-card-stats">' +
        '<div class="vendor-stat"><div class="vendor-stat-val">' + prods.length + '</div><div class="vendor-stat-lbl">Products</div></div>' +
        '<div class="vendor-stat"><div class="star-rating vendor-stat-val">' + stars + '</div><div class="vendor-stat-lbl">Rating</div></div>' +
        '<div class="vendor-stat"><div class="vendor-stat-val" style="color:var(--gold);">View →</div><div class="vendor-stat-lbl">Details</div></div>' +
      '</div>' +
    '</div>';
  }).join('');

  // Re-attach intersection observer for animations
  document.querySelectorAll('.animate-on-scroll:not(.visible)').forEach(el => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(20px)';
    el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.style.opacity='1'; e.target.style.transform='translateY(0)'; io.unobserve(e.target); } });
    }, { threshold: 0.05 });
    io.observe(el);
  });
}

function selectCatPill(btn, cat) {
  document.querySelectorAll('.cat-pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCat = cat;
  document.getElementById('catFilter').value = cat;
  renderVendors();
}

// ── Demo data seed ────────────────────────────────────────────

    { id:'vnd_demo1', userId:'demo_v1', businessName:'Kamau Premium Caskets', category:'Caskets', location:'Nairobi, Westlands', phone:'0712345678', email:'kamau@caskets.ke', description:'Kenya\'s finest caskets — oak, mahogany and steel options. Delivery nationwide.', rating:4.8, verified:true, status:'active', createdAt: new Date(Date.now()-86400000*10).toISOString() },
    { id:'vnd_demo2', userId:'demo_v2', businessName:'Tent Masters Kenya', category:'Tents', location:'Nairobi, Industrial Area', phone:'0723456789', email:'info@tentmasters.ke', description:'Large capacity tents and canopies for graveside and home service use. Chairs and tables packages available.', rating:4.6, verified:true, status:'active', createdAt: new Date(Date.now()-86400000*8).toISOString() },
    { id:'vnd_demo3', userId:'demo_v3', businessName:'Melody Sound PA', category:'PA Systems', location:'Nairobi, Eastleigh', phone:'0734567890', email:'melody@pa.ke', description:'Professional PA systems, microphones and livestreaming for funeral services.', rating:4.5, verified:false, status:'active', createdAt: new Date(Date.now()-86400000*6).toISOString() },
    { id:'vnd_demo4', userId:'demo_v4', businessName:'Mama Grace Catering', category:'Catering', location:'Kiambu County', phone:'0745678901', email:'grace@catering.ke', description:'Traditional Kenyan cuisine for funeral receptions — serving up to 500 guests. M-PESA friendly pricing.', rating:4.9, verified:true, status:'active', createdAt: new Date(Date.now()-86400000*4).toISOString() },
    { id:'vnd_demo5', userId:'demo_v5', businessName:'Rose Garden Florists', category:'Flowers', location:'Nairobi, CBD', phone:'0756789012', email:'roses@garden.ke', description:'Beautiful wreaths, floral arrangements and graveside bouquets. Same-day delivery.', rating:4.7, verified:false, status:'active', createdAt: new Date(Date.now()-86400000*2).toISOString() },
    { id:'vnd_demo6', userId:'demo_v6', businessName:'Swift Hearse Services', category:'Transport', location:'Nairobi, South B', phone:'0767890123', email:'swift@hearse.ke', description:'Dignified hearse and funeral convoy services throughout Kenya. 24/7 availability.', rating:4.4, verified:true, status:'active', createdAt: new Date(Date.now()-86400000).toISOString() },

  const demoProducts = [
    { id:'prod_d1', vendorId:'vnd_demo1', name:'Mahogany Classic Casket', category:'Caskets', price:85000, stock:5, description:'Hand-crafted mahogany casket with velvet interior.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d2', vendorId:'vnd_demo1', name:'Steel Premium Casket', category:'Caskets', price:65000, stock:8, description:'18-gauge steel casket, white satin interior.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d3', vendorId:'vnd_demo1', name:'Oak Traditional Coffin', category:'Caskets', price:45000, stock:10, description:'Natural oak coffin, dignified and affordable.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d4', vendorId:'vnd_demo2', name:'Large Event Tent (200 pax)', category:'Tents', price:25000, stock:3, description:'Waterproof tent 20x40m, includes sides and floor.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d5', vendorId:'vnd_demo2', name:'Monobloc Chair Package (100)', category:'Chairs', price:8000, stock:15, description:'100 white monobloc chairs, delivery and collection included.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d6', vendorId:'vnd_demo3', name:'PA System — Full Day', category:'PA Systems', price:12000, stock:2, description:'2x speakers, mixer, 2 microphones, operator included.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d7', vendorId:'vnd_demo4', name:'Funeral Reception — 200 guests', category:'Catering', price:60000, stock:1, description:'Full buffet: ugali, nyama, rice, vegetables, chapati.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d8', vendorId:'vnd_demo5', name:'Premium Funeral Wreath', category:'Flowers', price:3500, stock:20, description:'Fresh roses and lilies. Size: 60cm diameter.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d9', vendorId:'vnd_demo6', name:'Hearse Hire — Nairobi CBD', category:'Transport', price:15000, stock:2, description:'Black Mercedes hearse with professional driver.', status:'active', createdAt: new Date().toISOString() },
    { id:'prod_d10', vendorId:'vnd_demo5', name:'Bridal Lily Bouquet', category:'Flowers', price:2500, stock:0, description:'Elegant white lily bouquet — currently unavailable.', status:'active', createdAt: new Date().toISOString() },
  ];
  localStorage.setItem('faraja_vendors', JSON.stringify(demoVendors));
  localStorage.setItem('faraja_products', JSON.stringify(demoProducts));
  allVendors  = demoVendors;
  allProducts = demoProducts;
  document.getElementById('vendorCount').textContent = allVendors.length + ' vendors';
}

const CAT_ICONS   = { Caskets:'⚰️', Tents:'⛺', Chairs:'🪑', 'PA Systems':'🔊', Catering:'🍽️', Flowers:'💐', Transport:'🚗', Embalming:'🏥', Other:'📦' };
const CAT_CLASSES = { Caskets:'caskets', Tents:'tents', Chairs:'chairs', 'PA Systems':'pa', Catering:'catering', Flowers:'flowers', Transport:'transport' };
function catIcon(c)  { return CAT_ICONS[c]   || '📦'; }
function catClass(c) { return CAT_CLASSES[c] || ''; }
function starsHtml(r) {
  const full = Math.round(r || 0);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
