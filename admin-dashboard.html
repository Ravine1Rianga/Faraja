<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #020617;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #94a3b8;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
}

.sidebar a:hover {
    background: #1e293b;
    color: white;
}

/* Main */
.main {
    flex: 1;
    padding: 20px;
}

h1 {
    margin-bottom: 20px;
}

/* Cards */
.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
}

.card {
    background: #020617;
    padding: 20px;
    border-radius: 10px;
    flex: 1;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    background: #020617;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #1e293b;
}

th {
    color: #94a3b8;
}

td:last-child {
    text-align: right;
}

/* Buttons */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.approve {
    background: #059669;
    color: white;
}

.reject {
    background: #dc2626;
    color: white;
}

/* Status */
.status {
    font-weight: bold;
}

.approved {
    color: #10b981;
}

.rejected {
    color: #ef4444;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>🛡 Admin</h2>
    <a href="#">Dashboard</a>
    <a href="marketplace.html">Marketplace</a>
    <a href="index.html">Logout</a>
</div>

<!-- Main Content -->
<div class="main">
    <h1>System Dashboard</h1>

    <!-- Cards -->
    <div class="cards">
        <div class="card">
            <p>Memorial Pages</p>
            <h2 id="memorialCount">142</h2>
        </div>
        <div class="card">
            <p>Pending Vendors</p>
            <h2 id="pendingCount">2</h2>
        </div>
        <div class="card">
            <p>Total Funds</p>
            <h2>KES 1.2M</h2>
        </div>
    </div>

    <!-- Table -->
    <table>
        <thead>
            <tr>
                <th>Business Name</th>
                <th>Category</th>
                <th>Location</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="vendorTable">

            <tr id="row1">
                <td>Mombasa Elite Funeral Caskets</td>
                <td>Supplies</td>
                <td>Mombasa</td>
                <td>
                    <button class="approve" onclick="approveVendor('row1')">Approve</button>
                    <button class="reject" onclick="rejectVendor('row1')">Reject</button>
                </td>
            </tr>

            <tr id="row2">
                <td>Baraka Sound & PA Systems</td>
                <td>Audio</td>
                <td>Machakos</td>
                <td>
                    <button class="approve" onclick="approveVendor('row2')">Approve</button>
                    <button class="reject" onclick="rejectVendor('row2')">Reject</button>
                </td>
            </tr>

        </tbody>
    </table>
</div>

<!-- JavaScript -->
<script>

// Update pending count
function updatePendingCount() {
    let rows = document.querySelectorAll("#vendorTable tr");
    document.getElementById("pendingCount").innerText = rows.length;
}

// Approve Vendor
function approveVendor(rowId) {
    let row = document.getElementById(rowId);
    let actionCell = row.cells[3];

    actionCell.innerHTML = "<span class='status approved'>✔ Approved</span>";

    row.style.backgroundColor = "#064e3b";

    updatePendingCount();
}

// Reject Vendor
function rejectVendor(rowId) {
    let row = document.getElementById(rowId);
    let actionCell = row.cells[3];

    actionCell.innerHTML = "<span class='status rejected'>✖ Rejected</span>";

    row.style.backgroundColor = "#7f1d1d";

    updatePendingCount();
}

</script>

</body>
</html>
