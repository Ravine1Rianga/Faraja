<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Faraja</title>
  <meta name="description" content="Sign in to your Faraja account to manage funeral arrangements and harambee contributions." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕊</text></svg>" />
</head>
<body>

<!-- Back link -->
<a href="index.html" style="position:fixed;top:24px;left:24px;z-index:100;display:flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-muted);transition:var(--transition);" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">
  ← Back to Home
</a>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <a href="index.html" style="display:inline-block;">
        <div class="auth-logo-icon">🕊</div>
        <div class="auth-logo-name">Fa<span>raja</span></div>
      </a>
    </div>

    <!-- Alert area -->
    <div id="authAlert" style="display:none;"></div>

    <!-- Headings -->
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-subtitle text-muted">Sign in to continue managing your memorial</p>

    <div class="auth-divider"><span>sign in with email</span></div>

    <!-- Login Form -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-group">
          <span class="input-icon">✉</span>
          <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <label class="form-label" for="password" style="margin-bottom:0;">Password</label>
          <a href="forgot-password.html" style="font-size:0.8rem;color:var(--gold);">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" autocomplete="current-password" />
          <span class="input-suffix" data-toggle-password="password" title="Show/hide password">👁</span>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:28px;">
        <label class="form-check">
          <input type="checkbox" id="rememberMe" name="rememberMe" />
          <span class="form-check-label">Keep me signed in</span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-full" id="loginBtn">
        Sign In
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a href="register.html">Create one free →</a>
    </p>

    <!-- Demo credentials notice — DEPRECATED: the fake API used to accept
         any email + 6-char password. Now wired to the real backend,
         which enforces actual registered credentials, so this banner
         would be misleading. Commented out instead of deleted. -->
    <!-- Admin credentials hint -->
    <div class="alert alert-info" style="margin-top:20px;font-size:0.8rem;">
      <span>ℹ️</span>
      <div><strong>Admin access:</strong> <code>admin@faraja.co.ke</code> / <code>Admin@Faraja2025</code></div>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="js/main.js"></script>
<script>
  // Page guard — already logged in? redirect
  if (FarajaAPI.currentUser()) {
    FarajaAPI.redirectByRole(FarajaAPI.currentUser());
  }

  const loginForm = document.getElementById('loginForm');
  const loginBtn  = document.getElementById('loginBtn');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email');
    const password = document.getElementById('password');
    let valid = true;

    if (!validateField(email, [validators.required, validators.email], loginForm)) valid = false;
    if (!validateField(password, [validators.required, validators.minLen(6)], loginForm)) valid = false;
    if (!valid) return;

    Utils.setButtonLoading(loginBtn, true);
    const res = await FarajaAPI.login(email.value.trim(), password.value);
    Utils.setButtonLoading(loginBtn, false);

    if (res.success) {
      showToast('Welcome back, ' + res.user.name.split(' ')[0] + '! 👋', 'success');
      setTimeout(() => {
        FarajaAPI.redirectByRole(res.user);
      }, 800);
    } else {
      const alert = document.getElementById('authAlert');
      alert.style.display = 'block';
      alert.innerHTML = `<div class="alert alert-danger"><span>❌</span>${res.message}</div>`;
      showToast(res.message, 'error');
    }
  });

  // Clear errors on input
  ['email','password'].forEach(id => {
    document.getElementById(id).addEventListener('input', function(){
      clearFieldState(this);
      const alert = document.getElementById('authAlert');
      alert.style.display = 'none';
    });
  });


</script>
</body>
</html>
