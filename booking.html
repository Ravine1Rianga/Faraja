<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faraja - Complete Booking</title>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-slate-950 border border-slate-800 rounded-2xl p-6 sm:p-8 shadow-2xl">
        <h2 class="text-2xl font-bold text-white mb-1">Confirm Service Booking</h2>
        <p class="text-slate-400 text-xs mb-6">Fill in details to log your coordination itinerary with the chosen service vendor.</p>

        <form class="space-y-4" onsubmit="alert('Booking logged! Awaiting vendor approval confirmation.'); window.location.href='marketplace.html'; return false;">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Full Representative Name</label>
                <input type="text" required class="w-full p-3 rounded-lg bg-slate-900 border border-slate-800 text-white text-sm focus:outline-none focus:border-amber-500">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">M-Pesa Contact Number</label>
                    <input type="tel" placeholder="07XXXXXXXX" required class="w-full p-3 rounded-lg bg-slate-900 border border-slate-800 text-white text-sm focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Required Event Date</label>
                    <input type="date" required class="w-full p-3 rounded-lg bg-slate-900 border border-slate-800 text-slate-300 text-sm focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Delivery Destination / Location Venue</label>
                <textarea rows="2" placeholder="Provide clear directions for logistics setup..." required class="w-full p-3 rounded-lg bg-slate-900 border border-slate-800 text-white text-sm focus:outline-none focus:border-amber-500"></textarea>
            </div>

            <div class="p-4 bg-slate-900/60 border border-slate-800 rounded-xl text-xs space-y-1.5 text-slate-400">
                <div class="flex justify-between"><p>Vendor Base Fee:</p><span class="font-semibold text-white">KES 25,000</span></div>
                <div class="flex justify-between"><p>Platform Convenience Levy:</p><span class="font-semibold text-white">KES 250</span></div>
                <div class="flex justify-between border-t border-slate-800 pt-1.5 font-bold text-sm text-amber-500"><p>Total Due:</p><span>KES 25,250</span></div>
            </div>

            <button type="submit" class="w-full py-3 bg-amber-600 hover:bg-amber-700 text-white font-bold text-sm rounded-lg transition shadow-md">Submit Logistics Request</button>
        </form>
    </div>

</body>
</html>
