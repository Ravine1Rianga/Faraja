<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faraja - Memorial Portal</title>

<link rel="stylesheet" href="css/styles.css" />

<style>
body {
    line-height: 1.6;
}

.glass {
    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* gallery */
.gallery img {
    height: 120px;
    object-fit: cover;
}

/* smooth fade */
.fade-in {
    animation: fade 0.4s ease-in;
}

@keyframes fade {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

<header class="border-b border-slate-800 px-6 py-4 flex justify-between">
    <div class="text-xl font-bold text-amber-500">Faraja Memorials</div>
    <a href="index.html" class="text-sm text-slate-400">← Back</a>
</header>

<div class="max-w-4xl mx-auto p-6">

<!-- HERO -->
<div class="glass rounded-2xl p-8 text-center mb-8">
    <img src="https://picsum.photos/200" class="w-32 h-32 rounded-full mx-auto border-4 border-amber-500 mb-4">
    <h1 class="text-3xl font-bold text-amber-200">Mzee Joseph Odhiambo</h1>
    <p class="text-slate-400">1952 – 2026</p>

    <a href="#" class="inline-block mt-4 px-4 py-2 bg-amber-600 rounded-lg text-sm">
        View Order of Service
    </a>
</div>

<!-- LIVESTREAM -->
<div class="glass p-6 rounded-2xl mb-8">
    <h2 class="text-lg text-amber-100 mb-3">📹 Livestream</h2>

    <div class="aspect-video">
        <iframe width="100%" height="100%" 
            src="https://www.youtube.com/embed/live_stream?channel=UC4R8DWoMoI7CAwX8_LjQHig"
            frameborder="0" allowfullscreen>
        </iframe>
    </div>
</div>

<!-- GALLERY -->
<div class="glass p-6 rounded-2xl mb-8">
    <h2 class="text-lg text-amber-100 mb-3">📸 Photo Gallery</h2>

    <input type="file" id="photoUpload" class="mb-4 text-sm">

    <div id="gallery" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
</div>

<!-- CONDOLENCES -->
<div class="glass p-6 rounded-2xl">
    <h2 class="text-lg text-amber-100 mb-4">🕊 Condolence Book</h2>

    <form id="form" class="space-y-3 mb-6">
        <input id="name" placeholder="Your Name"
            class="w-full p-3 rounded bg-slate-900 border border-slate-700">

        <textarea id="message" placeholder="Your message..."
            class="w-full p-3 rounded bg-slate-900 border border-slate-700"></textarea>

        <button class="px-5 py-2 bg-amber-600 rounded">Submit</button>
    </form>

    <div id="messages" class="space-y-3 max-h-60 overflow-y-auto"></div>
</div>

</div>

<script>

/* -------------------- PHOTO UPLOAD -------------------- */
const upload = document.getElementById('photoUpload');
const gallery = document.getElementById('gallery');

let photos = JSON.parse(localStorage.getItem('photos')) || [];

function renderPhotos() {
    gallery.innerHTML = "";
    photos.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.className = "rounded fade-in";
        gallery.appendChild(img);
    });
}

upload.addEventListener('change', () => {
    const file = upload.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
        photos.push(reader.result);
        localStorage.setItem('photos', JSON.stringify(photos));
        renderPhotos();
    };
    reader.readAsDataURL(file);
});

renderPhotos();

/* -------------------- CONDOLENCES -------------------- */
const form = document.getElementById('form');
const container = document.getElementById('messages');

let messages = JSON.parse(localStorage.getItem('messages')) || [];

function renderMessages() {
    container.innerHTML = "";
    messages.forEach(m => {
        const div = document.createElement('div');
        div.className = "p-3 bg-slate-900 rounded fade-in";
        div.innerHTML = `<strong>${m.name}</strong><p>${m.text}</p>`;
        container.appendChild(div);
    });
}

form.addEventListener('submit', e => {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const text = document.getElementById('message').value;

    const newMsg = { name, text };

    messages.unshift(newMsg);
    localStorage.setItem('messages', JSON.stringify(messages));

    form.reset();
    renderMessages();
});

renderMessages();

</script>

</body>
</html>
